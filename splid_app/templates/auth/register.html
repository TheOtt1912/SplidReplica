{% extends 'base.html' %}

{% block title %}Sign Up — Splid Replica{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Create account 🌴</h1>
  <p class="page-subtitle">Join and start splitting expenses</p>
</div>

<div class="card">
  <form method="post">

    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Usman Mukaty" required>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required>
    </div>

    <button type="submit" class="btn-primary">Create Account</button>

  </form>

  <p class="auth-switch">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
</div>
{% endblock %}

{% block back_button %}
<div class="back-bar">
  <a href="javascript:history.back()" class="back-btn">← Back</a>
</div>
{% endblock %}
